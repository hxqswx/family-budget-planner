<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff8fa3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="家庭支出小管理" />
    <meta
      name="description"
      content="可爱的家庭支出小管理，支持分类预算、年度总结和离线使用。"
    />
    <title>家庭支出小管理</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Family Budget Lab</p>
          <h1>家庭支出小管理</h1>
          <p class="subtitle">把每一笔支出放进可爱的收纳盒里，年底也能看清每个月的变化。</p>
          <div class="hero-actions">
            <button id="installApp" class="install-button" type="button">安装到手机</button>
            <span id="offlineBadge" class="status-chip" hidden>离线可用</span>
          </div>
        </div>
        <div class="mascot-scene" aria-hidden="true">
          <div class="blob blob-one"></div>
          <div class="blob blob-two"></div>
          <div class="mascot">
            <div class="ear ear-left"></div>
            <div class="ear ear-right"></div>
            <div class="face">
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="mouth"></span>
            </div>
            <div class="belly">¥</div>
          </div>
          <div class="coin coin-one">+</div>
          <div class="coin coin-two">¥</div>
          <div class="coin coin-three">%</div>
        </div>
      </section>

      <section class="summary-grid" aria-label="预算概览">
        <article class="summary-card">
          <span>本月收入</span>
          <strong id="incomeTotal">¥0</strong>
        </article>
        <article class="summary-card">
          <span>已花费</span>
          <strong id="spentTotal">¥0</strong>
        </article>
        <article class="summary-card">
          <span>剩余预算</span>
          <strong id="remainingTotal">¥0</strong>
        </article>
        <article class="summary-card accent">
          <span>储蓄率</span>
          <strong id="savingRate">0%</strong>
        </article>
      </section>

      <section id="panelBoard" class="panel-board" aria-label="可拖拽板块">
        <aside class="panel input-panel" data-panel="input">
          <div class="panel-title">
            <h2>记录一笔</h2>
            <span class="pill">Local</span>
          </div>
          <form id="expenseForm">
            <label>
              名称
              <input id="expenseName" type="text" placeholder="例如：周末超市" required />
            </label>
            <label>
              金额
              <input id="expenseAmount" type="number" min="0.01" step="0.01" placeholder="128.50" required />
            </label>
            <label>
              分类
              <select id="expenseCategory" required></select>
            </label>
            <label>
              日期
              <input id="expenseDate" type="date" required />
            </label>
            <button type="submit">添加支出</button>
          </form>

          <div class="income-box">
            <label>
              本月家庭收入
              <input id="incomeInput" type="number" min="0" step="100" />
            </label>
          </div>
        </aside>

        <section class="panel budget-panel" data-panel="budget">
          <div class="panel-title">
            <h2>分类预算</h2>
            <div class="panel-actions">
              <button id="openCategoryEditor" class="ghost-button" type="button">修改分类</button>
              <button id="resetData" class="ghost-button danger" type="button">重置记录</button>
            </div>
          </div>
          <div id="categoryList" class="category-list"></div>
        </section>

        <section class="panel timeline-panel" data-panel="timeline">
          <div class="panel-title">
            <h2>最近支出</h2>
            <span id="expenseCount" class="pill">0 笔</span>
          </div>
          <div id="expenseList" class="expense-list"></div>
        </section>
        <section class="panel yearly-panel" data-panel="yearly">
          <div class="panel-title">
            <h2>年度总结</h2>
            <label class="compact-label">
              年份
              <select id="yearSelect"></select>
            </label>
          </div>
          <div class="year-stats">
            <article>
              <span>年度支出</span>
              <strong id="yearTotal">¥0</strong>
            </article>
            <article>
              <span>月均支出</span>
              <strong id="monthAverage">¥0</strong>
            </article>
            <article>
              <span>最高月份</span>
              <strong id="topMonth">-</strong>
            </article>
          </div>
          <div id="yearCategoryChips" class="year-category-chips"></div>
          <div id="monthBreakdown" class="month-grid"></div>
        </section>
      </section>
    </main>

    <dialog id="resetDialog" class="cute-dialog" aria-labelledby="resetDialogTitle">
      <div class="dialog-mascot" aria-hidden="true">
        <span class="dialog-ear left"></span>
        <span class="dialog-ear right"></span>
        <span class="dialog-face">¥</span>
      </div>
      <h2 id="resetDialogTitle">真的要清空记录吗？</h2>
      <p>所有支出记录会被删除，本月收入会归零；你的分类设置会保留。</p>
      <div class="dialog-actions">
        <button id="confirmReset" class="danger-button" type="button">清空记录</button>
        <button id="cancelReset" class="soft-button" type="button">再想想</button>
      </div>
    </dialog>

    <dialog id="installDialog" class="cute-dialog install-dialog" aria-labelledby="installDialogTitle">
      <div class="dialog-header">
        <h2 id="installDialogTitle">安装到 iPhone</h2>
        <button id="closeInstallDialog" class="close-button" type="button" aria-label="关闭">×</button>
      </div>
      <ol class="install-steps">
        <li>用 Safari 打开这个页面。</li>
        <li>点底部分享按钮。</li>
        <li>选择“添加到主屏幕”。</li>
      </ol>
      <button id="confirmInstallTip" class="soft-button" type="button">知道啦</button>
    </dialog>

    <dialog id="categoryDialog" class="cute-dialog category-dialog" aria-labelledby="categoryDialogTitle">
      <div class="dialog-header">
        <h2 id="categoryDialogTitle">修改分类</h2>
        <button id="closeCategoryEditor" class="close-button" type="button" aria-label="关闭">×</button>
      </div>
      <div class="dialog-tools">
        <button id="newCategory" class="icon-text-button" type="button">+ 新增</button>
      </div>
      <form id="categoryForm" class="category-form">
        <label>
          选择分类
          <select id="categorySelect"></select>
        </label>
        <div class="form-grid">
          <label>
            名称
            <input id="categoryName" type="text" maxlength="12" required />
          </label>
          <label>
            图标字
            <input id="categoryIcon" type="text" maxlength="2" required />
          </label>
          <label>
            月预算
            <input id="categoryBudget" type="number" min="0" step="100" required />
          </label>
          <label>
            颜色
            <input id="categoryColor" type="color" />
          </label>
        </div>
        <div class="button-row">
          <button type="submit">保存分类</button>
          <button id="deleteCategory" class="ghost-button danger" type="button">删除</button>
        </div>
      </form>
    </dialog>

    <template id="categoryTemplate">
      <article class="category-row">
        <div class="category-topline">
          <span class="category-icon"></span>
          <div>
            <h3></h3>
            <p></p>
          </div>
          <strong></strong>
        </div>
        <div class="progress-track">
          <span></span>
        </div>
      </article>
    </template>

    <template id="expenseTemplate">
      <article class="expense-row">
        <span class="expense-dot"></span>
        <div>
          <h3></h3>
          <p></p>
        </div>
        <strong></strong>
      </article>
    </template>

    <template id="monthTemplate">
      <article class="month-row">
        <div class="month-head">
          <h3></h3>
          <strong></strong>
        </div>
        <div class="month-bars"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
